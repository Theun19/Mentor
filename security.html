<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beveiliging - Mentormap</title>
    <meta name="theme-color" content="#009CDE" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <link rel="manifest" href="site.webmanifest" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header border-bottom">
      <div class="container-xl py-3">
        <div class="app-topbar app-topbar-simple">
          <div class="app-title">
            <p class="text-uppercase small fw-semibold text-success mb-1">Mentormap</p>
            <h1 class="h3 fw-bold mb-0">Beveiliging</h1>
          </div>

          <div class="app-actions" aria-label="Acties">
            <div class="translate-control">
              <label class="visually-hidden" for="securityLanguageSelect">Taal kiezen</label>
              <select class="form-select form-select-sm translate-select notranslate" translate="no" id="securityLanguageSelect" aria-label="Taal kiezen">
                <option value="nl">Nederlands 🇳🇱</option>
                <option value="en">Engels 🇬🇧</option>
                <option value="ar">Arabisch 🇸🇦</option>
                <option value="tr">Turks 🇹🇷</option>
                <option value="ro">Roemeens 🇷🇴</option>
                <option value="hu">Hongaars 🇭🇺</option>
                <option value="bg">Bulgaars 🇧🇬</option>
              </select>
            </div>
            <a class="btn btn-outline-secondary btn-sm" href="index.html">Terug</a>
          </div>
        </div>
      </div>
    </header>

    <main class="container-xl py-4 py-lg-5">
      <section class="security-panel details-panel p-4 p-md-5">
        <h2 class="h4 fw-bold mb-3">Gebruikersnaam en wachtwoord wijzigen</h2>
        <form id="securityForm">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" for="currentUsername">Huidige gebruikersnaam</label>
              <input class="form-control" id="currentUsername" type="text" autocomplete="username" required />
            </div>
            <div class="col-12">
              <label class="form-label" for="currentPassword">Huidig wachtwoord</label>
              <div class="input-group">
                <input class="form-control" id="currentPassword" type="password" autocomplete="current-password" required />
                <button class="btn btn-outline-secondary" type="button" data-password-toggle="currentPassword" aria-label="Wachtwoord tonen">Toon</button>
              </div>
            </div>
            <div class="col-12">
              <hr />
            </div>
            <div class="col-12">
              <label class="form-label" for="newUsername">Nieuwe gebruikersnaam</label>
              <input class="form-control" id="newUsername" type="text" autocomplete="username" required />
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label" for="newPassword">Nieuw wachtwoord</label>
              <div class="input-group">
                <input class="form-control" id="newPassword" type="password" autocomplete="new-password" minlength="4" required />
                <button class="btn btn-outline-secondary" type="button" data-password-toggle="newPassword" aria-label="Wachtwoord tonen">Toon</button>
              </div>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label" for="confirmPassword">Herhaal nieuw wachtwoord</label>
              <div class="input-group">
                <input class="form-control" id="confirmPassword" type="password" autocomplete="new-password" minlength="4" required />
                <button class="btn btn-outline-secondary" type="button" data-password-toggle="confirmPassword" aria-label="Wachtwoord tonen">Toon</button>
              </div>
            </div>
          </div>

          <p class="small mt-3 mb-0" id="securityMessage" aria-live="polite"></p>

          <div class="d-flex flex-wrap gap-2 mt-4">
            <button class="btn btn-success" type="submit">Opslaan</button>
            <a class="btn btn-outline-secondary" href="index.html">Annuleren</a>
          </div>
        </form>
      </section>
    </main>

    <div id="google_translate_element" class="google-translate-element" aria-hidden="true"></div>
    <script src="translate.js"></script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script src="security.js"></script>
  </body>
</html>

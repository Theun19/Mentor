<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wachtwoord resetten - Mentormap</title>
    <meta name="theme-color" content="#54851f" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container-xl py-4 py-lg-5">
      <section class="section-panel security-panel p-4 p-md-5">
        <h1 class="h4 fw-bold mb-3">Wachtwoord gereset</h1>
        <p class="text-secondary mb-4">
          Het lokale wachtwoord voor de mentormap is verwijderd. Je kunt nu een nieuw wachtwoord instellen.
        </p>
        <div class="alert alert-success" id="resetStatus">Reset wordt uitgevoerd...</div>
        <div class="d-flex flex-wrap gap-2">
          <a class="btn btn-success" href="security.html">Nieuw wachtwoord instellen</a>
          <a class="btn btn-outline-secondary" href="index.html">Terug naar mentormap</a>
        </div>
      </section>
    </main>

    <script>
      const storagePrefix = "mentor-checklist-nijmegen";
      const keysToRemove = [
        `${storagePrefix}:local-password-hash`,
        `${storagePrefix}:local-username`,
        `${storagePrefix}:unlocked`,
        `${storagePrefix}:auth-session`,
        `${storagePrefix}:auth-config`,
      ];

      keysToRemove.forEach((key) => {
        localStorage.removeItem(key);
        sessionStorage.removeItem(key);
      });

      document.getElementById("resetStatus").textContent =
        "Wachtwoord en vergrendelsessie zijn verwijderd voor deze website.";
    </script>
  </body>
</html>
